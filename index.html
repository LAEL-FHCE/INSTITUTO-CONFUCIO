<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instituto Confucio | UMSS - Futuro Milenario</title>
    <style>
        /* Definición de la Paleta "China Ciberpunk" */
        :root {
            --rojo-neón: #ff0033; /* Un rojo más vibrante y eléctrico */
            --rojo-oscuro: #800000;
            --dorado-eléctrico: #ffeb3b; /* Un dorado que brilla */
            --dorado-suave: #d4af37;
            --negro-profundo: #050505; /* Fondo casi negro para el contraste */
            --gris-tecnologico: #1a1a1a;
            --blanco-puro: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif; /* Una fuente moderna y limpia */
            background-color: var(--negro-profundo);
            color: var(--blanco-puro);
            overflow-x: hidden; /* Evita scrolls raros con las animaciones */
        }

        /* --- ENCABEZADO IMPACTANTE CON EFECTO NEÓN --- */
        header {
            background: linear-gradient(135deg, var(--gris-tecnologico) 0%, var(--negro-profundo) 100%);
            padding: 60px 20px;
            text-align: center;
            border-bottom: 4px solid var(--rojo-neón);
            position: relative;
            box-shadow: 0 0 30px rgba(255, 0, 51, 0.5); /* Resplandor rojo */
        }

        /* Título en Chino con Brillo Dorado */
        .titulo-chino {
            font-size: 5rem;
            color: var(--dorado-eléctrico);
            margin: 0;
            text-shadow: 0 0 15px var(--dorado-eléctrico), 0 0 25px var(--dorado-suave);
            font-weight: 900;
            letter-spacing: 5px;
        }

        .titulo-espanol {
            font-size: 2.2rem;
            color: var(--blanco-puro);
            margin: 10px 0 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 300;
        }

        .subtitulo {
            color: var(--rojo-neón);
            font-size: 1.2rem;
            margin-top: 10px;
            font-style: italic;
        }

        /* --- NAVEGACIÓN FUTURISTA --- */
        nav {
            background-color: rgba(0, 0, 0, 0.8); /* Semi-transparente */
            display: flex;
            justify-content: center;
            padding: 15px 0;
            position: sticky; /* Se queda arriba al hacer scroll */
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav a {
            color: var(--blanco-puro);
            text-decoration: none;
            margin: 0 25px;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            transition: all 0.4s ease;
            position: relative;
        }

        /* Efecto de línea inferior futurista al pasar el mouse */
        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--dorado-eléctrico);
            transition: width 0.4s;
        }

        nav a:hover {
            color: var(--dorado-eléctrico);
            text-shadow: 0 0 10px var(--dorado-eléctrico);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* --- SECCIÓN PRINCIPAL "HERO" CON DEGRADADO --- */
        .hero {
            height: 80vh; /* Ocupa casi toda la pantalla */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, var(--rojo-oscuro) 0%, var(--negro-profundo) 70%);
            padding: 0 20px;
        }

        .hero h2 {
            font-size: 3.5rem;
            margin: 0;
            color: var(--blanco-puro);
            line-height: 1.2;
        }

        .hero h2 span {
            color: var(--dorado-eléctrico);
            text-shadow: 0 0 10px var(--dorado-eléctrico);
        }

        .hero p {
            font-size: 1.5rem;
            color: #cccccc;
            max-width: 800px;
            margin: 30px 0;
            font-weight: 300;
        }

        /* --- BOTÓN INTERACTIVO "TECNOLÓGICO" --- */
        .btn-futurista {
            display: inline-block;
            padding: 15px 40px;
            background: transparent;
            color: var(--dorado-eléctrico);
            border: 2px solid var(--dorado-eléctrico);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            border-radius: 50px; /* Bordes muy redondeados */
            transition: all 0.5s ease;
            box-shadow: 0 0 15px rgba(255, 235, 59, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Efecto de "escaneo" al pasar el mouse */
        .btn-futurista::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: all 0.6s;
        }

        .btn-futurista:hover {
            background-color: var(--dorado-eléctrico);
            color: var(--negro-profundo);
            box-shadow: 0 0 30px var(--dorado-eléctrico);
            transform: scale(1.05); /* Se agranda un poco */
        }

        .btn-futurista:hover::before {
            left: 100%;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="titulo-chino">孔子学院</div>
        <div class="titulo-espanol">Instituto Confucio</div>
        <div class="subtitulo">Universidad Mayor de San Simón | Cochabamba</div>
    </header>

    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#cursos">Cursos</a>
        <a href="#becas">Becas y Oportunidades</a>
        <a href="#cultura">Cultura</a>
    </nav>

    <div class="hero" id="inicio">
        <h2>CONECTA TU FUTURO CON LA<br><span>MILENARIA CHINA</span></h2>
        <p>Aprende el idioma del mañana, accede a certificaciones HSK y descubre oportunidades globales de intercambio.</p>
        <a href="#cursos" class="btn-futurista">Explorar Oportunidades</a>
    </div>

</body>
</html>
